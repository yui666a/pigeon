services:
  # ==============================================
  # 開発用コンテナ (Rust + Node.js)
  # ==============================================
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/app/src-tauri/target
      - node-modules:/app/node_modules
    working_dir: /app
    environment:
      - CARGO_HOME=/usr/local/cargo
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    tty: true
    stdin_open: true

  # ==============================================
  # Rust テスト
  # ==============================================
  test-rust:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/app/src-tauri/target
    working_dir: /app/src-tauri
    command: cargo test
    environment:
      - CARGO_HOME=/usr/local/cargo
    profiles:
      - test

  # ==============================================
  # フロントエンド テスト
  # ==============================================
  test-frontend:
    image: node:24-bookworm-slim
    volumes:
      - .:/app
      - node-modules:/app/node_modules
    working_dir: /app
    command: sh -c "corepack enable && pnpm test"
    profiles:
      - test

  # ==============================================
  # Rust リント (clippy + fmt check)
  # ==============================================
  lint-rust:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/app/src-tauri/target
    working_dir: /app/src-tauri
    command: sh -c "cargo fmt -- --check && cargo clippy -- -D warnings"
    environment:
      - CARGO_HOME=/usr/local/cargo
    profiles:
      - lint

  # ==============================================
  # Ollama (ローカルLLM)
  # ==============================================
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  cargo-cache:
  cargo-git:
  target-cache:
  node-modules:
  ollama-data:
