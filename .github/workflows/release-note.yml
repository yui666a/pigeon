# mainブランチマージ時にドラフトのリリースノートを作成・更新する。
# ドラフトは release.yml を発火させない（published のみ）ため、
# 「マージのたびにノートが溜まり、publish した瞬間に DMG がビルド・添付される」流れになる。
name: upsert-release-note

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read

jobs:
  upsert-release-note:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Create Release Note
        uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: true
