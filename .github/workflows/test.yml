name: Test

on:
  # branches を指定しない: スタックPR（main 以外を base にする PR）でも CI を走らせる
  pull_request:

# GITHUB_TOKEN は読み取りのみ（既定権限の縮小）
permissions:
  contents: read

concurrency:
  group: test-${{ github.head_ref }}
  cancel-in-progress: true

# サードパーティ action はフル SHA でピン留めする（タグの差し替えによる
# サプライチェーン攻撃の防止）。更新は dependabot (github-actions) が追従する。
jobs:
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # cache-apt-pkgs-action は apt-get update を行わず、イメージの古い
      # パッケージインデックスがミラーに無い deb を参照して 404 になっても
      # ジョブを失敗させず握りつぶすため、素の apt-get に置き換えた
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libglib2.0-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Run tests
        run: cargo test

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # latest だと pnpm のメジャー更新で挙動が変わり CI が壊れるため固定
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      # 配布物に影響する既知脆弱性の可視化（non-blocking。恒久対応は dependabot）
      - name: Audit production dependencies
        run: pnpm audit --prod
        continue-on-error: true
