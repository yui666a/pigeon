name: Test

on:
  # branches を指定しない: スタックPR（main 以外を base にする PR）でも CI を走らせる
  pull_request:

concurrency:
  group: test-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      # cache-apt-pkgs-action は apt-get update を行わず、イメージの古い
      # パッケージインデックスがミラーに無い deb を参照して 404 になっても
      # ジョブを失敗させず握りつぶすため、素の apt-get に置き換えた
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libglib2.0-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run tests
        run: cargo test

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # latest だと pnpm のメジャー更新で挙動が変わり CI が壊れるため固定
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
