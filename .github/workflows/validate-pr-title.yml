# PR タイトルの Conventional Commits 形式を検証する。
# release-drafter の autolabeler はタイトルの type からラベルを付与するため、
# この検証が通ることがリリースノートの正しいカテゴリ分類の前提になる。
name: 'Validate PR title'

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  contents: read

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      pull-requests: read
      # wip: true は WIP 状態をコミットステータスとして書き込むため statuses: write が必要
      statuses: write
    # dependabotでは `secrets.GITHUB_TOKEN` を参照できないためスキップ
    # （dependabot のタイトルは chore(deps): 形式で規約準拠のため実害なし）
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # https://github.com/amannn/action-semantic-pull-request#configuration
        # type はアクションのデフォルト（feat/fix/docs/style/refactor/perf/test/build/ci/chore/revert）。
        # scopes は指定しない: agent.md のスコープ定義は非網羅（mail-sync, classifier, search, ui, db 等）
        # のため、任意のスコープを許容する（スコープ省略も可）
        with:
          # タイトルのprefixに [WIP] があれば検証を保留にする
          wip: true
          # これらのラベルが付いているものは検証の対象外にする
          ignoreLabels: |
            bot
            ignore-semantic-pull-request
