# Pigeon のタグは vX.Y.Z 形式（release.yml のバージョン整合チェックと
# ruleset protect-release-tags が v* 前提）のため v を付ける
name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# prerelease もバージョン解決と変更履歴の基準リリースに含める。
# これがないと prerelease しかない期間はドラフトが v0.0.1・変更なしで生成される
# (v0.1.1 パイプライン検証リリースで実際に発生)
include-pre-releases: true

# v7 の新スキーマ（when 条件）を使用。旧スキーマ（categories[*].labels /
# version-resolver.*.labels）は非推奨警告が出るため移行済み
categories:
  - title: '🚀 Features'
    when:
      labels:
        - 'feature'
        - 'enhancement'

  - title: '🐛 Bug Fixes'
    when:
      labels:
        - 'bug'
        - 'bugfix'
        - 'fix'
        - 'emergency'

  - title: '⚡ Performance'
    when:
      label: 'performance'

  - title: '🔧 Refactoring'
    when:
      label: 'refactor'

  - title: '📖 Documentation'
    when:
      label: 'documentation'

  - title: '✅ Tests'
    when:
      label: 'test'

  - title: '🧰 Maintenance'
    when:
      labels:
        - 'chore'
        - 'dependencies'

  # major/minor ラベルは autolabeler では付与せず、必要な場合のみ手動で付与する運用。
  # ラベル未付与時のデフォルトは patch（when なしの version-resolver）。
  # publish 前に tauri.conf.json の version をドラフトのバージョンと一致させる PR を
  # マージすること（不一致は release.yml の整合チェックが publish 後のビルドで検知して失敗する）
  - type: 'version-resolver'
    semver-increment: 'major'
    when:
      label: 'major'

  - type: 'version-resolver'
    semver-increment: 'minor'
    when:
      label: 'minor'

  - type: 'version-resolver'
    semver-increment: 'patch'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'

change-title-escapes: '\<*_&' # You can add # and @ to disable mentions, and add ` to disable code blocks.

template: |
  ## Changes
  $CHANGES

# PR タイトルは Conventional Commits を強制している（validate-pr-title.yml）。
# ラベルは運用上付与しないため、autolabeler が PR タイトルの `type(scope)!:` 形式から
# ラベルを自動付与し、上記 categories でカテゴリ分類する。
# v7 では autolabeler は本体（release-note.yml の closed 実行）では動かず、
# 分離アクション（autolabel.yml が opened/synchronize 等で実行）が本セクションを読む。
# ブランチ名は作業内容ベースでタイトルの type と食い違うことが多いため、title のみを判定に使う。
autolabeler:
  - label: enhancement
    title:
      - '/^feat(\(.+\))?!?:/i'

  - label: bug
    title:
      - '/^fix(\(.+\))?!?:/i'

  - label: performance
    title:
      - '/^perf(\(.+\))?!?:/i'

  - label: refactor
    title:
      - '/^refactor(\(.+\))?!?:/i'

  - label: documentation
    title:
      - '/^docs(\(.+\))?!?:/i'

  - label: test
    title:
      - '/^test(\(.+\))?!?:/i'

  - label: chore
    title:
      - '/^(chore|ci|build|style|revert)(\(.+\))?!?:/i'
